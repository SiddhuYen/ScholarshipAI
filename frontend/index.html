<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>EssayMatch</title>

<style>
body {
  font-family: system-ui, -apple-system, sans-serif;
  background: #f7f5f0;
  margin: 0;
  padding: 40px;
  color: #1a1916;
}

.container {
  max-width: 700px;
  margin: auto;
}

h1 {
  font-size: 2rem;
  margin-bottom: 10px;
}

.card {
  background: white;
  border: 1px solid #ddd;
  border-radius: 10px;
  padding: 20px;
  margin-bottom: 20px;
}

button {
  padding: 10px 18px;
  border-radius: 999px;
  border: none;
  background: #2a5f4a;
  color: white;
  cursor: pointer;
}

button:disabled {
  opacity: 0.5;
}

.upload {
  border: 2px dashed #ccc;
  padding: 30px;
  text-align: center;
  cursor: pointer;
}

.result {
  border: 1px solid #ddd;
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 10px;
}

.error {
  background: #fee;
  padding: 10px;
  border: 1px solid #f99;
  border-radius: 6px;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">

<h1>EssayMatch</h1>

<div class="card">
  <input id="state" placeholder="State" />
  <input id="major" placeholder="Major" />
</div>

<div class="card upload" id="upload">
  Click or drop CSV
  <input type="file" id="file" hidden />
</div>

<button id="run" disabled>Find Scholarships</button>

<div id="status"></div>
<div id="results"></div>

</div>

<script>
const API =
  location.hostname === "localhost"
    ? "http://localhost:5000"
    : "https://scholarshipai-9nd4.onrender.com";

let essays = [];

/* ---------- CSV PARSER ---------- */
function parseCSV(text) {
  const lines = text.trim().split("\n");
  const headers = lines[0].split(",");

  return lines.slice(1).map(line => {
    const values = line.split(",");
    const obj = {};
    headers.forEach((h, i) => obj[h.trim()] = (values[i] || "").trim());
    return obj;
  });
}

/* ---------- FILE UPLOAD ---------- */
const upload = document.getElementById("upload");
const fileInput = document.getElementById("file");

upload.onclick = () => fileInput.click();

fileInput.onchange = e => handleFile(e.target.files[0]);

upload.ondrop = e => {
  e.preventDefault();
  handleFile(e.dataTransfer.files[0]);
};

upload.ondragover = e => e.preventDefault();

function handleFile(file) {
  const reader = new FileReader();
  reader.onload = e => {
    const parsed = parseCSV(e.target.result);

    essays = parsed.filter(r => r.Prompt && r.Response);

    document.getElementById("status").innerText =
      `${essays.length} essays loaded`;

    document.getElementById("run").disabled = essays.length === 0;
  };
  reader.readAsText(file);
}

/* ---------- RUN PIPELINE ---------- */
document.getElementById("run").onclick = async () => {
  const state = document.getElementById("state").value;
  const major = document.getElementById("major").value;

  const status = document.getElementById("status");
  const resultsDiv = document.getElementById("results");

  status.innerText = "Running...";
  resultsDiv.innerHTML = "";

  try {
    const response = await fetch(`${API}/match`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        profile: { state, major },
        essays: essays.map(e => ({
          prompt: e.Prompt,
          response: e.Response
        }))
      })
    });

    if (!response.ok) {
      const text = await response.text();
      console.error("SERVER ERROR:", text);
      throw new Error("Backend returned " + response.status);
    }

    const data = await response.json();

    status.innerText = `Found ${data.length} matches`;

    data.forEach(r => {
      const div = document.createElement("div");
      div.className = "result";

      div.innerHTML = `
        <b>${escape(r.scholarship_purpose)}</b><br>
        Score: ${Math.round(r.match_score * 100)}%<br><br>
        <i>${escape(r.best_essay_prompt)}</i><br>
        ${escape(r.best_essay_response).slice(0, 200)}...<br><br>
        <a href="${r.scholarship_url}" target="_blank">Apply</a>
      `;

      resultsDiv.appendChild(div);
    });

  } catch (err) {
    console.error(err);

    status.innerHTML = `
      <div class="error">
        Request failed.<br>
        Open console for details.
      </div>
    `;
  }
};

/* ---------- SAFE HTML ---------- */
function escape(str) {
  return String(str)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;");
}
</script>

</body>
</html>
